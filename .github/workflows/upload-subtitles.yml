name: upload-subtitles

# Dopošle titulky k už dříve uploadnutým filmům. Spouštět typicky den po
# sync.yml, kdy prehraj.to stihne zpracovat videa (subtitle upload na
# "Zpracovává se" videa selže).

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Max videí v jednom běhu (0 = všechno, default 0)"
        required: false
        default: "0"
      only_film_id:
        description: "Testovací: jen konkrétní sledujteto_file_id (0 = všechny)"
        required: false
        default: "0"

jobs:
  upload-subs:
    name: Upload subtitles to processed videos
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Init log entry
        run: |
          mkdir -p state
          touch state/subs.log
          RUN_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo ""
            echo "===== subs run $RUN_TS count=${{ inputs.count }} only=${{ inputs.only_film_id }} ($RUN_URL) ====="
          } >> state/subs.log

      - name: Upload subtitles
        env:
          PREHRAJTO_EMAIL: ${{ secrets.PREHRAJTO_EMAIL }}
          PREHRAJTO_PASSWORD: ${{ secrets.PREHRAJTO_PASSWORD }}
        run: |
          ARGS=""
          if [ "${{ inputs.count }}" != "0" ]; then
            ARGS="$ARGS --count ${{ inputs.count }}"
          fi
          if [ "${{ inputs.only_film_id }}" != "0" ]; then
            ARGS="$ARGS --only-film-id ${{ inputs.only_film_id }}"
          fi
          python src/upload_subtitles.py $ARGS

      - name: Commit state + log
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/uploaded.json state/subs.log
          if git diff --cached --quiet; then
            echo "no state changes to commit"
          else
            git commit -m "chore(subs): subtitle upload run"
            git pull --rebase origin main || true
            git push
          fi
