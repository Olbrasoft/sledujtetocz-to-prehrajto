name: sync

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Kolik filmů nahrát v jednom běhu (default 1)"
        required: false
        default: "1"
      lang_classes:
        description: "Lang filter (comma-sep, `ALL` = bez filtru)"
        required: false
        default: "CZ_DUB,CZ_SUB"
  # schedule:
  #   - cron: "0 */6 * * *"  # enable až po ověření

jobs:
  upload-batch:
    name: Upload N missing films
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Init log entry
        run: |
          mkdir -p state
          touch state/sync.log
          RUN_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo ""
            echo "===== run $RUN_TS batch_size=${{ inputs.batch_size }} lang=${{ inputs.lang_classes }} ($RUN_URL) ====="
          } >> state/sync.log

      - name: Run sync batch
        env:
          PREHRAJTO_EMAIL: ${{ secrets.PREHRAJTO_EMAIL }}
          PREHRAJTO_PASSWORD: ${{ secrets.PREHRAJTO_PASSWORD }}
          LANG_CLASSES: ${{ inputs.lang_classes }}
        run: |
          python src/sync_batch.py --count "${{ inputs.batch_size }}"

      - name: Commit state + log
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p state
          touch state/uploaded.json state/sync.log
          git add state/uploaded.json state/sync.log
          if git diff --cached --quiet; then
            echo "no state changes to commit"
          else
            UP_COUNT=$(python -c "import json,os; p='state/uploaded.json'; d=json.load(open(p)) if os.path.getsize(p)>0 else {}; print(len(d.get('uploads',[])))")
            git commit -m "chore(sync): batch run — total uploads now ${UP_COUNT}"
            git pull --rebase origin main || true
            git push
          fi
