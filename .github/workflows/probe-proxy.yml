name: probe-proxy
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Root
        run: |
          curl -sv --max-time 60 'https://sledujteto.aspfree.cz/' 2>&1 | tail -30 || true
      - name: Hash no key
        run: |
          curl -sv --max-time 60 'https://sledujteto.aspfree.cz/Hash.ashx?id=100943' 2>&1 | tail -30 || true
      - name: Hash with new key
        env:
          PROXY_KEY: ${{ secrets.SLEDUJTETO_PROXY_KEY }}
        run: |
          curl -sv --max-time 60 "https://sledujteto.aspfree.cz/Hash.ashx?id=100943&key=$PROXY_KEY" 2>&1 | tail -30 || true
      - name: Hash with OLD key (should be 403 now)
        run: |
          curl -sv --max-time 60 'https://sledujteto.aspfree.cz/Hash.ashx?id=100943&key=***REDACTED-PROXY-SECRET***' 2>&1 | tail -30 || true
